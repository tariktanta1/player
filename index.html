<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>sesler</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400;1,500&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #faf7f2;
    --bg2: #f5f0e8;
    --surface: #ffffff;
    --surface2: #fef9ee;
    --border: #e8dfc8;
    --border2: #d4c8aa;
    --amber: #d97706;
    --amber2: #f59e0b;
    --amber-dim: rgba(217,119,6,0.08);
    --amber-glow: rgba(217,119,6,0.05);
    --text: #1c1209;
    --text2: #7a6a52;
    --text3: #bfaa88;
    --player-h: 100px;
    --vol-pct: 70%;
    --shadow: 0 1px 3px rgba(28,18,9,0.06), 0 4px 16px rgba(28,18,9,0.04);
    --shadow-lg: 0 2px 8px rgba(28,18,9,0.08), 0 8px 32px rgba(28,18,9,0.06);
  }
 
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html { scroll-behavior: smooth; }
 
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
    min-height: 100dvh;
    overscroll-behavior: none;
  }
 
  /* Texture overlay */
  .texture {
    position: fixed; inset: 0; pointer-events: none; z-index: 0; opacity: 0.55;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 400 400' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
  }
 
  /* Warm light orbs */
  .ambient {
    position: fixed; inset: 0; pointer-events: none; z-index: 0;
    background:
      radial-gradient(ellipse 70% 50% at 15% 5%, rgba(245,158,11,0.07) 0%, transparent 60%),
      radial-gradient(ellipse 50% 40% at 85% 85%, rgba(217,119,6,0.05) 0%, transparent 60%),
      radial-gradient(ellipse 40% 30% at 50% 50%, rgba(254,243,199,0.4) 0%, transparent 70%);
  }
 
  .wrap {
    position: relative; z-index: 1;
    max-width: 680px; margin: 0 auto;
    padding: 3rem 1.5rem calc(var(--player-h) + 2.5rem);
  }
 
  /* Header */
  header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 3rem;
    padding-bottom: 2rem;
    border-bottom: 1px solid var(--border);
  }
 
  .logo {
    font-family: 'Playfair Display', serif;
    font-size: 34px;
    font-weight: 400;
    letter-spacing: -0.5px;
    color: var(--text);
    line-height: 1;
  }
  .logo em {
    font-style: italic;
    color: var(--amber);
  }
  .logo-sub {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--text3);
    margin-top: 4px;
    display: block;
  }
 
  .header-right {
    display: flex; align-items: center; gap: 12px;
  }
 
  .count-pill {
    font-size: 10px;
    color: var(--text3);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 5px 14px;
    border-radius: 99px;
    box-shadow: var(--shadow);
  }
  .count-pill span { color: var(--amber); font-weight: 500; }
 
  /* Upload button */
  .upload-btn-wrap {
    position: relative;
    display: inline-flex;
  }
  .upload-btn-wrap input[type=file] {
    position: absolute; inset: 0; opacity: 0; cursor: pointer;
    width: 100%; height: 100%;
  }
  .upload-btn {
    display: flex; align-items: center; gap: 7px;
    background: var(--amber);
    border: none;
    color: #fff;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    padding: 9px 18px;
    border-radius: 8px;
    cursor: pointer;
    transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
    white-space: nowrap;
    box-shadow: 0 2px 8px rgba(217,119,6,0.3), 0 1px 2px rgba(217,119,6,0.2);
    font-weight: 500;
  }
  .upload-btn:hover {
    background: #c96d04;
    box-shadow: 0 4px 14px rgba(217,119,6,0.4), 0 1px 3px rgba(217,119,6,0.2);
    transform: translateY(-1px);
  }
  .upload-btn:active { transform: translateY(0); }
  .upload-btn svg { width: 13px; height: 13px; flex-shrink: 0; }
 
  /* Drop overlay */
  .drop-overlay {
    position: fixed; inset: 0; z-index: 500;
    background: rgba(250,247,242,0.93);
    backdrop-filter: blur(12px);
    display: flex; align-items: center; justify-content: center;
    opacity: 0; pointer-events: none;
    transition: opacity 0.2s;
  }
  .drop-overlay.active { opacity: 1; pointer-events: all; }
  .drop-box {
    border: 1.5px dashed var(--border2);
    border-radius: 20px;
    padding: 4rem 5rem;
    text-align: center;
    background: var(--surface);
    box-shadow: var(--shadow-lg);
  }
  .drop-box .drop-icon {
    font-family: 'Playfair Display', serif;
    font-size: 52px;
    color: var(--amber);
    margin-bottom: 1rem;
    display: block;
    font-style: italic;
  }
  .drop-box p {
    font-size: 11px; color: var(--text2);
    letter-spacing: 0.12em; text-transform: uppercase;
  }
 
  /* Upload progress */
  .upload-progress {
    display: none;
    align-items: center; gap: 12px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 18px;
    margin-bottom: 2rem;
    font-size: 11px;
    color: var(--text2);
    box-shadow: var(--shadow);
  }
  .upload-progress.active { display: flex; }
  .upload-progress .pbar { flex: 1; height: 2px; background: var(--border); border-radius: 2px; }
  .upload-progress .pfill { height: 100%; background: var(--amber); border-radius: 2px; width: 0%; transition: width 0.2s; }
 
  /* Section label */
  .section-label {
    font-size: 9px; color: var(--text3);
    letter-spacing: 0.18em; text-transform: uppercase;
    margin-bottom: 1rem;
    padding-left: 4px;
    display: flex; align-items: center; gap: 10px;
  }
  .section-label::after {
    content: ''; flex: 1; height: 1px; background: var(--border);
  }
 
  /* Track list */
  .track-list {
    display: flex; flex-direction: column; gap: 3px;
  }
 
  .track {
    display: grid;
    grid-template-columns: 32px 1fr auto auto;
    align-items: center;
    gap: 14px;
    padding: 14px 16px;
    background: transparent;
    border: 1px solid transparent;
    border-radius: 12px;
    transition: background 0.2s, border-color 0.2s, box-shadow 0.2s, transform 0.1s;
    cursor: pointer;
    position: relative;
    -webkit-user-select: none; user-select: none;
  }
  .track:hover {
    background: var(--surface);
    border-color: var(--border);
    box-shadow: var(--shadow);
    transform: translateX(2px);
  }
  .track.playing {
    background: var(--surface2);
    border-color: rgba(217,119,6,0.2);
    box-shadow: 0 1px 4px rgba(217,119,6,0.1), 0 4px 16px rgba(217,119,6,0.06);
    transform: translateX(4px);
  }
 
  .track-num-wrap {
    width: 32px; height: 32px;
    display: flex; align-items: center; justify-content: center;
    position: relative;
    flex-shrink: 0;
  }
  .track-num {
    font-size: 11px; color: var(--text3);
    font-variant-numeric: tabular-nums;
    font-weight: 400;
  }
  .track-play-icon {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    opacity: 0; transition: opacity 0.15s;
    color: var(--amber);
    font-size: 12px;
  }
  .track:hover .track-num { opacity: 0; }
  .track:hover .track-play-icon { opacity: 1; }
  .track.playing .track-num { opacity: 0; }
  .track.playing .track-play-icon { opacity: 1; }
 
  .track-info { min-width: 0; }
  .track-name {
    font-family: 'Playfair Display', serif;
    font-size: 17px;
    font-weight: 400;
    color: var(--text);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    line-height: 1.2;
    letter-spacing: 0.01em;
  }
  .track.playing .track-name {
    color: var(--amber);
    font-style: italic;
  }
  .track-size {
    font-size: 10px; color: var(--text3);
    margin-top: 3px;
    letter-spacing: 0.04em;
  }
 
  .track-dur {
    font-size: 11px; color: var(--text3);
    font-variant-numeric: tabular-nums;
    min-width: 34px; text-align: right;
    flex-shrink: 0;
  }
 
  .del-btn {
    background: none; border: none; cursor: pointer;
    color: var(--text3); font-size: 14px;
    width: 28px; height: 28px;
    display: flex; align-items: center; justify-content: center;
    border-radius: 6px;
    transition: color 0.15s, background 0.15s;
    flex-shrink: 0;
    opacity: 0;
  }
  .track:hover .del-btn { opacity: 1; }
  .del-btn:hover { color: #c0392b; background: rgba(192,57,43,0.08); }
 
  /* Empty state */
  .empty {
    text-align: center;
    padding: 5rem 0;
  }
  .empty-icon {
    font-family: 'Playfair Display', serif;
    font-size: 56px;
    color: var(--text3);
    display: block;
    margin-bottom: 1.25rem;
    font-style: italic;
  }
  .empty p {
    font-size: 11px; color: var(--text3);
    letter-spacing: 0.14em; text-transform: uppercase;
  }
 
  /* Player bar */
  .player-bar {
    position: fixed; bottom: 0; left: 0; right: 0;
    height: var(--player-h);
    background: rgba(255,255,255,0.96);
    backdrop-filter: blur(24px) saturate(180%);
    -webkit-backdrop-filter: blur(24px) saturate(180%);
    border-top: 1px solid var(--border);
    z-index: 200;
    transform: translateY(100%);
    transition: transform 0.35s cubic-bezier(0.16,1,0.3,1);
    box-shadow: 0 -4px 24px rgba(28,18,9,0.06);
  }
  .player-bar.active { transform: translateY(0); }
  .player-bar::before {
    content: '';
    position: absolute; top: -1px; left: 0; right: 0; height: 2px;
    background: linear-gradient(90deg, transparent 0%, var(--amber2) 30%, var(--amber) 50%, var(--amber2) 70%, transparent 100%);
    opacity: 0.6;
  }
 
  /* ── Desktop layout ── */
  .player-inner {
    max-width: 680px; margin: 0 auto; height: 100%;
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    padding: 0 1.5rem; gap: 1rem;
  }
  .now-playing { min-width: 0; }
  .now-label { font-size: 9px; color: var(--text3); letter-spacing: 0.16em; text-transform: uppercase; margin-bottom: 4px; }
  .now-name {
    font-family: 'Playfair Display', serif;
    font-size: 17px; font-weight: 400; color: var(--text);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    line-height: 1; font-style: italic;
  }
  .controls { display: flex; align-items: center; gap: 8px; }
  .ctrl-btn {
    background: var(--surface); border: 1px solid var(--border);
    color: var(--text2); width: 36px; height: 36px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; transition: all 0.15s; flex-shrink: 0; box-shadow: var(--shadow);
  }
  .ctrl-btn svg { width: 13px; height: 13px; }
  .ctrl-btn:hover { border-color: var(--border2); color: var(--text); box-shadow: var(--shadow-lg); transform: translateY(-1px); }
  .ctrl-btn:active { transform: translateY(0); box-shadow: none; }
  .ctrl-btn.main {
    border-color: var(--amber); background: var(--amber); color: #fff;
    width: 44px; height: 44px;
    box-shadow: 0 2px 8px rgba(217,119,6,0.35), 0 1px 3px rgba(217,119,6,0.2);
  }
  .ctrl-btn.main svg { width: 15px; height: 15px; }
  .ctrl-btn.main:hover { background: #c96d04; border-color: #c96d04; box-shadow: 0 4px 14px rgba(217,119,6,0.45); }
 
  /* Right area — desktop: progress + volume stacked */
  .right-area { display: flex; flex-direction: column; gap: 7px; align-items: stretch; min-width: 0; width: 220px; }
  .progress-area { display: flex; align-items: center; gap: 8px; }
  .volume-area   { display: flex; align-items: center; gap: 8px; }
  .time-lbl { font-size: 10px; color: var(--text3); font-variant-numeric: tabular-nums; min-width: 28px; text-align: center; flex-shrink: 0; }
 
  /* ── Custom slider ── */
  .slider-wrap {
    flex: 1; display: flex; align-items: center;
    height: 20px; position: relative; cursor: pointer; touch-action: none;
  }
  .slider-track {
    position: absolute; left: 0; right: 0; height: 3px;
    background: var(--border2); border-radius: 3px; overflow: visible;
    transition: height 0.15s;
  }
  .slider-wrap:hover .slider-track,
  .slider-wrap.dragging .slider-track { height: 5px; }
  .slider-fill { height: 100%; background: var(--amber); border-radius: 3px; pointer-events: none; }
  .slider-thumb {
    position: absolute; top: 50%; width: 14px; height: 14px; border-radius: 50%;
    background: var(--amber); box-shadow: 0 0 5px rgba(217,119,6,0.5);
    transform: translate(-50%, -50%); pointer-events: none;
    transition: transform 0.1s, box-shadow 0.1s;
  }
  .slider-wrap:hover .slider-thumb,
  .slider-wrap.dragging .slider-thumb { transform: translate(-50%,-50%) scale(1.25); box-shadow: 0 0 10px rgba(217,119,6,0.6); }
 
  .vol-btn {
    background: none; border: none; cursor: pointer; color: var(--text2); padding: 0;
    display: flex; align-items: center; justify-content: center;
    width: 22px; flex-shrink: 0; transition: color 0.15s;
  }
  .vol-btn:hover { color: var(--amber); }
  .vol-btn svg { width: 17px; height: 17px; }
  .vol-spacer { width: 28px; flex-shrink: 0; }
 
  audio { display: none; }
 
  /* Toast */
  .toast {
    position: fixed; bottom: calc(var(--player-h) + 14px); left: 50%; transform: translateX(-50%) translateY(8px);
    background: var(--surface); border: 1px solid var(--border);
    color: var(--text2); font-size: 11px; padding: 8px 20px; border-radius: 99px;
    opacity: 0; transition: opacity 0.25s, transform 0.25s;
    pointer-events: none; z-index: 300; white-space: nowrap;
    letter-spacing: 0.04em; box-shadow: var(--shadow-lg);
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
 
  /* Waveform bars */
  .wave { display: flex; align-items: flex-end; gap: 2px; height: 14px; width: 16px; }
  .wave span { display: block; width: 2px; background: var(--amber); border-radius: 1px; animation: wave 0.9s ease-in-out infinite; }
  .wave span:nth-child(1) { animation-delay: 0s; }
  .wave span:nth-child(2) { animation-delay: 0.18s; }
  .wave span:nth-child(3) { animation-delay: 0.36s; }
  @keyframes wave { 0%,100% { height: 4px; } 50% { height: 14px; } }
 
  /* ── Desktop general tweaks ── */
  @media (min-width: 481px) {
    .track:hover { transform: translateX(2px); }
  }
 
  /* ── Mobile: full redesign of player ── */
  @media (max-width: 480px) {
    :root { --player-h: 116px; }
    .wrap { padding: 2rem 1rem calc(var(--player-h) + 1.5rem); }
    .logo { font-size: 28px; }
    .upload-btn span { display: none; }
    .upload-btn { padding: 9px 13px; }
    .track { gap: 10px; padding: 12px 10px; border-radius: 10px; }
    .track-name { font-size: 15px; }
    .track:hover { transform: translateX(0); }
    .del-btn { opacity: 1; }
 
    /* Mobile player: 3-row stacked layout */
    .player-inner {
      display: flex; flex-direction: column;
      justify-content: center;
      padding: 10px 16px 12px;
      gap: 0; max-width: 100%;
    }
 
    /* Row 1: full-width progress bar */
    .mob-prog-row {
      display: flex; align-items: center; gap: 8px;
      width: 100%; margin-bottom: 10px;
    }
    .mob-prog-row .slider-wrap { height: 28px; }
    .mob-prog-row .slider-track { height: 4px; }
    .mob-prog-row .slider-thumb { width: 20px; height: 20px; }
    .mob-prog-row .slider-wrap.dragging .slider-track,
    .mob-prog-row .slider-wrap:hover .slider-track { height: 6px; }
 
    /* Row 2: track name + controls + volume on same line */
    .mob-bottom-row {
      display: flex; align-items: center; gap: 0;
      width: 100%;
    }
    .mob-track-name {
      flex: 1; min-width: 0;
      font-family: 'Playfair Display', serif;
      font-size: 14px; font-weight: 400; font-style: italic;
      color: var(--text);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .mob-controls { display: flex; align-items: center; gap: 6px; flex-shrink: 0; margin: 0 8px; }
    .mob-controls .ctrl-btn { width: 32px; height: 32px; }
    .mob-controls .ctrl-btn.main { width: 40px; height: 40px; }
    .mob-controls .ctrl-btn svg { width: 12px; height: 12px; }
    .mob-controls .ctrl-btn.main svg { width: 14px; height: 14px; }
    .mob-vol-row { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
    .mob-vol-row .slider-wrap { width: 72px; height: 28px; flex: none; }
    .mob-vol-row .slider-track { height: 3px; }
    .mob-vol-row .slider-thumb { width: 18px; height: 18px; }
    .mob-vol-row .vol-btn svg { width: 16px; height: 16px; }
 
    /* Hide desktop layout elements on mobile */
    .player-inner > .now-playing,
    .player-inner > .controls,
    .player-inner > .right-area { display: none; }
  }
</style>
</head>
<body>
<div class="ambient"></div>
<div class="texture"></div>
 
<div class="drop-overlay" id="dropOverlay">
  <div class="drop-box">
    <span class="drop-icon">♪</span>
    <p>Bırak, yüklensin</p>
  </div>
</div>
 
<div class="wrap">
  <header>
    <div>
      <div class="logo">ses<em>ler</em></div>
      <span class="logo-sub">müzik arşivi</span>
    </div>
    <div class="header-right">
      <div class="count-pill"><span id="countNum">0</span> parça</div>
      <div class="upload-btn-wrap">
        <input type="file" id="fileInput" accept="audio/*" multiple>
        <div class="upload-btn">
          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M8 11V3M5 6l3-3 3 3M3 13h10"/>
          </svg>
          <span>Yükle</span>
        </div>
      </div>
    </div>
  </header>
 
  <div class="upload-progress" id="uploadProgress">
    <span id="uploadText">yükleniyor...</span>
    <div class="pbar"><div class="pfill" id="pfill"></div></div>
  </div>
 
  <div class="section-label" id="sectionLabel" style="display:none">parçalar</div>
  <div class="track-list" id="trackList">
    <div class="empty">
      <span class="empty-icon">♩</span>
      <p>yükleniyor...</p>
    </div>
  </div>
</div>
 
<div class="player-bar" id="playerBar">
  <audio id="audioEl"></audio>
  <div class="player-inner">
 
    <!-- Desktop: left (track name) -->
    <div class="now-playing">
      <div class="now-label">şu an</div>
      <div class="now-name" id="nowName">—</div>
    </div>
 
    <!-- Desktop: center (controls) -->
    <div class="controls">
      <button class="ctrl-btn" id="prevBtn" aria-label="önceki">
        <svg viewBox="0 0 16 16" fill="currentColor"><path d="M3 3h1.5v10H3zm9.5 1.5L7 8l5.5 3.5V4.5z"/></svg>
      </button>
      <button class="ctrl-btn main" id="playPauseBtn" aria-label="oynat/durdur">
        <svg id="playIcon" viewBox="0 0 16 16" fill="currentColor"><path d="M5 3.5l8 4.5-8 4.5V3.5z"/></svg>
        <svg id="pauseIcon" viewBox="0 0 16 16" fill="currentColor" style="display:none"><path d="M5 3h2v10H5zm4 0h2v10H9z"/></svg>
      </button>
      <button class="ctrl-btn" id="nextBtn" aria-label="sonraki">
        <svg viewBox="0 0 16 16" fill="currentColor"><path d="M11.5 3H13v10h-1.5zm-9 1.5L7 8 2.5 11.5V4.5z"/></svg>
      </button>
    </div>
 
    <!-- Desktop: right (progress + volume) -->
    <div class="right-area">
      <div class="progress-area">
        <span class="time-lbl" id="curTime">0:00</span>
        <div class="slider-wrap" id="progWrap" role="slider" aria-label="ilerleme">
          <div class="slider-track"><div class="slider-fill" id="progFill"></div></div>
          <div class="slider-thumb" id="progThumb"></div>
        </div>
        <span class="time-lbl" id="durTime">0:00</span>
      </div>
      <div class="volume-area">
        <button class="vol-btn" id="volBtn" aria-label="sesi kapat/aç">
          <svg id="volIcon" viewBox="0 0 20 20" fill="currentColor">
            <path d="M9.5 4L5.5 7.5H2v5h3.5L9.5 16V4z"/>
            <path d="M12.5 7.5a3.5 3.5 0 010 5M14.8 5.2a6.5 6.5 0 010 9.6" stroke="currentColor" stroke-width="1.2" fill="none" stroke-linecap="round"/>
          </svg>
        </button>
        <div class="slider-wrap" id="volWrap" role="slider" aria-label="ses seviyesi">
          <div class="slider-track"><div class="slider-fill" id="volFill"></div></div>
          <div class="slider-thumb" id="volThumb"></div>
        </div>
        <div class="vol-spacer"></div>
      </div>
    </div>
 
    <!-- Mobile Row 1: full-width progress -->
    <div class="mob-prog-row">

    <!-- Mobile Row 2: name + controls + volume -->
    <div class="mob-bottom-row">

      <div class="mob-controls">
        <button class="ctrl-btn" id="mobPrevBtn" aria-label="önceki">
          <svg viewBox="0 0 16 16" fill="currentColor"><path d="M3 3h1.5v10H3zm9.5 1.5L7 8l5.5 3.5V4.5z"/></svg>
        </button>
        <button class="ctrl-btn main" id="mobPlayPauseBtn" aria-label="oynat/durdur">
          <svg id="mobPlayIcon" viewBox="0 0 16 16" fill="currentColor"><path d="M5 3.5l8 4.5-8 4.5V3.5z"/></svg>
          <svg id="mobPauseIcon" viewBox="0 0 16 16" fill="currentColor" style="display:none"><path d="M5 3h2v10H5zm4 0h2v10H9z"/></svg>
        </button>
        <button class="ctrl-btn" id="mobNextBtn" aria-label="sonraki">
          <svg viewBox="0 0 16 16" fill="currentColor"><path d="M11.5 3H13v10h-1.5zm-9 1.5L7 8 2.5 11.5V4.5z"/></svg>
        </button>

      <div class="mob-vol-row">
        <button class="vol-btn" id="mobVolBtn" aria-label="sesi kapat/aç">
          <svg id="mobVolIcon" viewBox="0 0 20 20" fill="currentColor">
            <path d="M9.5 4L5.5 7.5H2v5h3.5L9.5 16V4z"/>
            <path d="M12.5 7.5a3.5 3.5 0 010 5M14.8 5.2a6.5 6.5 0 010 9.6" stroke="currentColor" stroke-width="1.2" fill="none" stroke-linecap="round"/>
          </svg>
        </button>
        <div class="slider-wrap" id="mobVolWrap" role="slider" aria-label="ses seviyesi">
          <div class="slider-track"><div class="slider-fill" id="mobVolFill"></div></div>
          <div class="slider-thumb" id="mobVolThumb"></div>
        </div>
      </div>
    </div>
 
  </div>
</div>
 
<div class="toast" id="toast"></div>
 
<script>
const SUPABASE_URL = 'https://zjsyoqkxhabkevgyaega.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inpqc3lvcWt4aGFia2V2Z3lhZWdhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg2ODA2MTAsImV4cCI6MjA5NDI1NjYxMH0.mrtRgw2y02CnAnBJNte2urvZy7Od_13-oQZ2_gPDwOo';
const BUCKET = 'muzik';
 
let tracks = [], currentIdx = -1, isPlaying = false;
 
const audio = document.getElementById('audioEl');
const trackList = document.getElementById('trackList');
const playerBar = document.getElementById('playerBar');
const countNum = document.getElementById('countNum');
const nowName = document.getElementById('nowName');
const playPauseBtn = document.getElementById('playPauseBtn');
const playIcon = document.getElementById('playIcon');
const pauseIcon = document.getElementById('pauseIcon');
const prevBtn = document.getElementById('prevBtn');
const nextBtn = document.getElementById('nextBtn');
const curTime = document.getElementById('curTime');
const durTime = document.getElementById('durTime');
const uploadProgress = document.getElementById('uploadProgress');
const pfill = document.getElementById('pfill');
const uploadText = document.getElementById('uploadText');
const toastEl = document.getElementById('toast');
const dropOverlay = document.getElementById('dropOverlay');
const sectionLabel = document.getElementById('sectionLabel');
const volBtn = document.getElementById('volBtn');
const volIcon = document.getElementById('volIcon');
const progWrap  = document.getElementById('progWrap');
const progFill  = document.getElementById('progFill');
const progThumb = document.getElementById('progThumb');
const volWrap   = document.getElementById('volWrap');
const volFill   = document.getElementById('volFill');
const volThumb  = document.getElementById('volThumb');
// Mobile elements
const mobProgWrap  = document.getElementById('mobProgWrap');
const mobProgFill  = document.getElementById('mobProgFill');
const mobProgThumb = document.getElementById('mobProgThumb');
const mobVolWrap   = document.getElementById('mobVolWrap');
const mobVolFill   = document.getElementById('mobVolFill');
const mobVolThumb  = document.getElementById('mobVolThumb');
const mobNowName   = document.getElementById('mobNowName');
const mobCurTime   = document.getElementById('mobCurTime');
const mobDurTime   = document.getElementById('mobDurTime');
const mobVolBtn    = document.getElementById('mobVolBtn');
const mobVolIcon   = document.getElementById('mobVolIcon');
const mobPlayPauseBtn = document.getElementById('mobPlayPauseBtn');
const mobPlayIcon     = document.getElementById('mobPlayIcon');
const mobPauseIcon    = document.getElementById('mobPauseIcon');
const mobPrevBtn = document.getElementById('mobPrevBtn');
const mobNextBtn = document.getElementById('mobNextBtn');
 
let lastVol = 80, isMuted = false, isSeeking = false;
let volPct = 0.8; // 0-1
 
/* ── Custom slider helper ── */
function setSliderPct(fill, thumb, pct) {
  const p = Math.max(0, Math.min(1, pct));
  const css = (p * 100).toFixed(2) + '%';
  fill.style.width = css;
  thumb.style.left  = css;
}
 
function getPctFromEvent(wrap, e) {
  const r = wrap.getBoundingClientRect();
  const x = e.touches ? e.touches[0].clientX : e.clientX;
  return Math.max(0, Math.min(1, (x - r.left) / r.width));
}
 
function makeSlider(wrap, onDrag, onEnd) {
  let active = false;
  function start(e) {
    active = true; wrap.classList.add('dragging');
    onDrag(getPctFromEvent(wrap, e));
    e.preventDefault();
  }
  function move(e) {
    if (!active) return;
    onDrag(getPctFromEvent(wrap, e));
    e.preventDefault();
  }
  function end(e) {
    if (!active) return;
    active = false; wrap.classList.remove('dragging');
    if (onEnd) onEnd(getPctFromEvent(wrap, e.type === 'touchend' ? e.changedTouches[0] : e));
  }
  wrap.addEventListener('mousedown',  start, {passive: false});
  wrap.addEventListener('touchstart', start, {passive: false});
  document.addEventListener('mousemove',  move, {passive: false});
  document.addEventListener('touchmove',  move, {passive: false});
  document.addEventListener('mouseup',  end);
  document.addEventListener('touchend', end);
}
 
/* ── Progress slider ── */
makeSlider(progWrap,
  (pct) => {
    isSeeking = true;
    setSliderPct(progFill, progThumb, pct);
    if (audio.duration) curTime.textContent = fmt(pct * audio.duration);
  },
  (pct) => {
    if (audio.duration) audio.currentTime = pct * audio.duration;
    isSeeking = false;
  }
);
 
/* ── Mobile progress slider ── */
makeSlider(mobProgWrap,
  (pct) => {
    isSeeking = true;
    setSliderPct(mobProgFill, mobProgThumb, pct);
    setSliderPct(progFill, progThumb, pct);
    if (audio.duration) { const t = fmt(pct * audio.duration); mobCurTime.textContent = t; curTime.textContent = t; }
  },
  (pct) => {
    if (audio.duration) audio.currentTime = pct * audio.duration;
    isSeeking = false;
  }
);
 
/* ── Volume slider ── */
const volHighSVG = `<path d="M9.5 4L5.5 7.5H2v5h3.5L9.5 16V4z"/><path d="M12.5 7.5a3.5 3.5 0 010 5M14.8 5.2a6.5 6.5 0 010 9.6" stroke="currentColor" stroke-width="1.2" fill="none" stroke-linecap="round"/>`;
const volLowSVG  = `<path d="M9.5 4L5.5 7.5H2v5h3.5L9.5 16V4z"/><path d="M12.5 7.5a3.5 3.5 0 010 5" stroke="currentColor" stroke-width="1.2" fill="none" stroke-linecap="round"/>`;
const volMuteSVG = `<path d="M9.5 4L5.5 7.5H2v5h3.5L9.5 16V4z" opacity="0.35"/><path d="M13 8.5l3 3m0-3l-3 3" stroke="currentColor" stroke-width="1.3" fill="none" stroke-linecap="round"/>`;
 
function setVolIcon(pct) {
  if (pct === 0 || isMuted) volIcon.innerHTML = volMuteSVG;
  else if (pct < 0.4) volIcon.innerHTML = volLowSVG;
  else volIcon.innerHTML = volHighSVG;
}
 
function setMobVolIcon(pct) {
  if (pct === 0 || isMuted) mobVolIcon.innerHTML = volMuteSVG;
  else if (pct < 0.4) mobVolIcon.innerHTML = volLowSVG;
  else mobVolIcon.innerHTML = volHighSVG;
}
 
function applyVol(pct) {
  volPct = Math.max(0, Math.min(1, pct));
  audio.volume = volPct;
  setSliderPct(volFill, volThumb, volPct);
  setSliderPct(mobVolFill, mobVolThumb, volPct);
  setVolIcon(volPct);
  setMobVolIcon(volPct);
}
 
makeSlider(volWrap,
  (pct) => { isMuted = false; lastVol = pct; applyVol(pct); },
  null
);
 
volBtn.addEventListener('click', () => {
  isMuted = !isMuted;
  if (isMuted) { audio.volume = 0; setSliderPct(volFill, volThumb, 0); setVolIcon(0); }
  else { applyVol(lastVol || 0.8); }
});
 
applyVol(0.8);
 
/* ── Mobile volume slider ── */
makeSlider(mobVolWrap,
  (pct) => { isMuted = false; lastVol = pct; applyVol(pct); },
  null
);
mobVolBtn.addEventListener('click', () => {
  isMuted = !isMuted;
  if (isMuted) { audio.volume = 0; setSliderPct(volFill, volThumb, 0); setSliderPct(mobVolFill, mobVolThumb, 0); setVolIcon(0); setMobVolIcon(0); }
  else { applyVol(lastVol || 0.8); }
});
 
function showToast(msg, dur=2500) {
  toastEl.textContent = msg;
  toastEl.classList.add('show');
  setTimeout(() => toastEl.classList.remove('show'), dur);
}
 
function fmt(s) {
  if (!s || isNaN(s)) return '0:00';
  return Math.floor(s/60) + ':' + String(Math.floor(s%60)).padStart(2,'0');
}
 
function fmtSize(b) {
  if (!b) return '';
  if (b < 1048576) return (b/1024).toFixed(0) + ' KB';
  return (b/1048576).toFixed(1) + ' MB';
}
 
function getUrl(path) {
  return `${SUPABASE_URL}/storage/v1/object/public/${BUCKET}/${encodeURIComponent(path)}`;
}
 
function setPlayState(playing) {
  isPlaying = playing;
  playIcon.style.display = playing ? 'none' : '';
  pauseIcon.style.display = playing ? '' : 'none';
  mobPlayIcon.style.display = playing ? 'none' : '';
  mobPauseIcon.style.display = playing ? '' : 'none';
}
 
async function fetchTracks(attempt = 1) {
  try {
    const res = await fetch(`${SUPABASE_URL}/storage/v1/object/list/${BUCKET}`, {
      method: 'POST',
      headers: { 'Authorization': `Bearer ${SUPABASE_KEY}`, 'apikey': SUPABASE_KEY, 'Content-Type': 'application/json' },
      body: JSON.stringify({ limit: 500, offset: 0, prefix: '' })
    });
    if (!res.ok) {
      if (attempt < 3) { setTimeout(() => fetchTracks(attempt + 1), attempt * 1500); return; }
      renderTracks(); return;
    }
    const data = await res.json();
    if (!Array.isArray(data)) { renderTracks(); return; }
    tracks = data
      .filter(f => f.name && /\.(mp3|wav|flac|ogg|m4a|aac)$/i.test(f.name))
      .map(f => ({
        name: f.name.replace(/\.[^.]+$/, ''),
        path: f.name,
        size: f.metadata?.size || 0,
        url: getUrl(f.name)
      }));
    renderTracks();
  } catch(e) {
    if (attempt < 3) { setTimeout(() => fetchTracks(attempt + 1), attempt * 1500); return; }
    renderTracks();
  }
}
 
function renderTracks() {
  countNum.textContent = tracks.length;
  sectionLabel.style.display = tracks.length ? '' : 'none';
  if (!tracks.length) {
    trackList.innerHTML = '<div class="empty"><span class="empty-icon">♩</span><p>henüz parça yok — yükle</p></div>';
    return;
  }
  trackList.innerHTML = tracks.map((t,i) => `
    <div class="track${i===currentIdx?' playing':''}" data-i="${i}" onclick="handleTrackClick(${i})" ontouchend="handleTouchPlay(event,${i})">
      <div class="track-num-wrap">
        <span class="track-num">${String(i+1).padStart(2,'0')}</span>
        <span class="track-play-icon">
          ${i===currentIdx && isPlaying
            ? '<div class="wave"><span></span><span></span><span></span></div>'
            : '<svg width="12" height="12" viewBox="0 0 16 16" fill="currentColor"><path d="M5 3.5l8 4.5-8 4.5V3.5z"/></svg>'}
        </span>
      </div>
      <div class="track-info">
        <div class="track-name">${t.name}</div>
        ${t.size ? `<div class="track-size">${fmtSize(t.size)}</div>` : ''}
      </div>
      <div class="track-dur" id="dur-${i}">—</div>
      <button class="del-btn" onclick="event.stopPropagation();deleteTrack(${i})" aria-label="sil">
        <svg width="12" height="12" viewBox="0 0 16 16" fill="currentColor"><path d="M4 4l8 8M12 4l-8 8" stroke="currentColor" stroke-width="1.5" fill="none"/></svg>
      </button>
    </div>
  `).join('');
}
 
function handleTouchPlay(e, i) {
  // On mobile: touchend fires before click, prevent ghost click, play directly
  e.preventDefault();
  handleTrackClick(i);
}
 
function handleTrackClick(i) {
  if (currentIdx === i && isPlaying) {
    audio.pause(); setPlayState(false); renderTracks();
  } else {
    playTrack(i);
  }
}
 
function playTrack(i) {
  if (!tracks[i]) return;
  currentIdx = i;
  setSliderPct(progFill, progThumb, 0);
  setSliderPct(mobProgFill, mobProgThumb, 0);
  mobCurTime.textContent = '0:00'; mobDurTime.textContent = '0:00';
  curTime.textContent = '0:00'; durTime.textContent = '0:00';
  audio.src = tracks[i].url;
  audio.play().catch(()=>{});
  setPlayState(true);
  nowName.textContent = tracks[i].name;
  mobNowName.textContent = tracks[i].name;
  playerBar.classList.add('active');
  renderTracks();
}
 
async function deleteTrack(i) {
  if (!confirm(`"${tracks[i].name}" silinsin mi?`)) return;
  const path = tracks[i].path;
  if (currentIdx === i) { audio.pause(); audio.src=''; setPlayState(false); currentIdx=-1; playerBar.classList.remove('active'); }
  else if (currentIdx > i) currentIdx--;
  await fetch(`${SUPABASE_URL}/storage/v1/object/${BUCKET}/${encodeURIComponent(path)}`, {
    method: 'DELETE',
    headers: { 'Authorization': `Bearer ${SUPABASE_KEY}`, 'apikey': SUPABASE_KEY }
  });
  showToast('silindi');
  await fetchTracks();
}
 
async function uploadFile(file) {
  const res = await fetch(`${SUPABASE_URL}/storage/v1/object/${BUCKET}/${encodeURIComponent(file.name)}`, {
    method: 'POST',
    headers: { 'Authorization': `Bearer ${SUPABASE_KEY}`, 'apikey': SUPABASE_KEY, 'Content-Type': file.type||'audio/mpeg', 'x-upsert': 'true' },
    body: file
  });
  return res.ok;
}
 
async function addFiles(files) {
  const af = Array.from(files).filter(f => f.type.startsWith('audio/') || /\.(mp3|wav|flac|ogg|m4a|aac)$/i.test(f.name));
  if (!af.length) return;
  uploadProgress.classList.add('active');
  let failed = 0;
  for (let i=0; i<af.length; i++) {
    uploadText.textContent = af[i].name.replace(/\.[^.]+$/,'');
    pfill.style.width = ((i/af.length)*100)+'%';
    const ok = await uploadFile(af[i]);
    if (!ok) failed++;
  }
  pfill.style.width = '100%';
  setTimeout(() => { uploadProgress.classList.remove('active'); pfill.style.width='0%'; }, 600);
  showToast(failed ? `${af.length - failed} yüklendi, ${failed} başarısız` : `${af.length} parça yüklendi ✓`);
  await fetchTracks();
}
 
mobPlayPauseBtn.onclick = () => {
  if (currentIdx < 0) return;
  if (isPlaying) { audio.pause(); setPlayState(false); }
  else { audio.play().catch(()=>{}); setPlayState(true); }
  renderTracks();
};
mobNextBtn.onclick = () => { if (tracks.length) playTrack((currentIdx+1)%tracks.length); };
mobPrevBtn.onclick = () => {
  if (!tracks.length) return;
  if (audio.currentTime > 3) { audio.currentTime=0; return; }
  playTrack((currentIdx-1+tracks.length)%tracks.length);
};
 
playPauseBtn.onclick = () => {
  if (currentIdx < 0) return;
  if (isPlaying) { audio.pause(); setPlayState(false); }
  else { audio.play().catch(()=>{}); setPlayState(true); }
  renderTracks();
};
nextBtn.onclick = () => { if (tracks.length) playTrack((currentIdx+1)%tracks.length); };
prevBtn.onclick = () => {
  if (!tracks.length) return;
  if (audio.currentTime > 3) { audio.currentTime=0; return; }
  playTrack((currentIdx-1+tracks.length)%tracks.length);
};
 
audio.addEventListener('ended', () => {
  if (currentIdx < tracks.length-1) playTrack(currentIdx+1);
  else { setPlayState(false); renderTracks(); }
});
audio.addEventListener('timeupdate', () => {
  if (!audio.duration || isSeeking) return;
  const pct = audio.currentTime / audio.duration;
  setSliderPct(progFill, progThumb, pct);
  setSliderPct(mobProgFill, mobProgThumb, pct);
  curTime.textContent = fmt(audio.currentTime);
  durTime.textContent = fmt(audio.duration);
  mobCurTime.textContent = fmt(audio.currentTime);
  mobDurTime.textContent = fmt(audio.duration);
  const d = document.getElementById('dur-'+currentIdx);
  if (d && d.textContent==='—') d.textContent = fmt(audio.duration);
});
 
document.getElementById('fileInput').addEventListener('change', e => addFiles(e.target.files));
 
document.addEventListener('dragenter', e => { if ([...e.dataTransfer.types].includes('Files')) { e.preventDefault(); dropOverlay.classList.add('active'); } });
document.addEventListener('dragover', e => e.preventDefault());
document.addEventListener('dragleave', e => { if (!e.relatedTarget || e.relatedTarget===document.documentElement) dropOverlay.classList.remove('active'); });
document.addEventListener('drop', e => { e.preventDefault(); dropOverlay.classList.remove('active'); addFiles(e.dataTransfer.files); });
 
fetchTracks();
</script>
