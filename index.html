  .svol{display:flex;align-items:center;gap:10px}

<script>
const SUPABASE_URL='https://zjsyoqkxhabkevgyaega.supabase.co',SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inpqc3lvcWt4aGFia2V2Z3lhZWdhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg2ODA2MTAsImV4cCI6MjA5NDI1NjYxMH0.mrtRgw2y02CnAnBJNte2urvZy7Od_13-oQZ2_gPDwOo',BUCKET='muzik';

const hs=`<path d="M9.5 4L5.5 7.5H2v5h3.5L9.5 16V4z"/><path d="M12.5 7.5a3.5 3.5 0 010 5M14.8 5.2a6.5 6.5 0 010 9.6" stroke="currentColor" stroke-width="1.2" fill="none" stroke-linecap="round"/>`,ls=`<path d="M9.5 4L5.5 7.5H2v5h3.5L9.5 16V4z"/><path d="M12.5 7.5a3.5 3.5 0 010 5" stroke="currentColor" stroke-width="1.2" fill="none" stroke-linecap="round"/>`,ms=`<path d="M9.5 4L5.5 7.5H2v5h3.5L9.5 16V4z" opacity=".35"/><path d="M13 8.5l3 3m0-3l-3 3" stroke="currentColor" stroke-width="1.3" fill="none" stroke-linecap="round"/>`;

async function fetchTracks(){try{const r=await fetch(`${SUPABASE_URL}/storage/v1/object/list/${BUCKET}`,{method:'POST',headers:{Authorization:`Bearer ${SUPABASE_KEY}`,apikey:SUPABASE_KEY,'Content-Type':'application/json'},body:JSON.stringify({limit:500,offset:0,prefix:''})});const d=await r.json();tracks=(Array.isArray(d)?d:[]).filter(f=>f.name&&/\.(mp3|wav|flac|ogg|m4a|aac)$/i.test(f.name)).map(f=>({name:f.name.replace(/\.[^.]+$/,''),path:f.name,size:f.metadata?.size||0,url:url(f.name)}))}catch{}render()}

window.pick=pick;window.touchPick=touchPick;window.del=del;

['pp','mpp','spp'].forEach(i=>$(i).onclick=tog);['next','mnext','snext'].forEach(i=>$(i).onclick=nx);['prev','mprev','sprev'].forEach(i=>$(i).onclick=pr);

slider($('mpw'),p=>{seeking=true;setS($('mpf'),$('mpt'),p);setS($('pf'),$('pt'),p);setS($('spf'),$('spt'),p);if(audio.duration){const t=fmt(p*audio.duration);$('ct').textContent=t;$('mct').textContent=t;$('sct').textContent=t}},p=>{if(audio.duration)audio.currentTime=p*audio.duration;seeking=false});

let ssy=null,sdy=0;$('sheet').addEventListener('touchstart',e=>{if(!$('sheet').classList.contains('active'))return;ssy=e.touches[0].clientY;sdy=0},{passive:true});$('sheet').addEventListener('touchmove',e=>{if(ssy===null)return;const d=e.touches[0].clientY-ssy;if(d>0){sdy=d;$('sheet').style.transform=`translateY(${Math.min(70,d/6)}%)`}},{passive:true});$('sheet').addEventListener('touchend',()=>{$('sheet').style.transform='';if(ssy===null)return;if(sdy>90)closeSheet(true);ssy=null;sdy=0});
