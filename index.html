<!doctype html>
<html lang="tr">
<head>
<meta charset="utf-8">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;1,500&family=DM+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#f6f1e8;--bg2:#eee3d2;--line:#ddcdb4;--txt:#24190f;--muted:#8f7a60;--ac:#d97706;--ac2:#f59e0b;--barh:138px}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{width:100%;min-height:100%;overflow-x:hidden;background:var(--bg);overscroll-behavior:none}
body{font-family:"DM Sans",sans-serif;color:var(--txt);background:radial-gradient(1000px 600px at 10% -20%,rgba(245,158,11,.14),transparent 60%),radial-gradient(900px 500px at 90% 120%,rgba(217,119,6,.12),transparent 62%),linear-gradient(180deg,var(--bg),var(--bg2))}
.wrap{max-width:860px;margin:0 auto;padding:26px 12px calc(var(--barh) + 14px)}
header{display:flex;align-items:center;justify-content:space-between;padding-bottom:16px;margin-bottom:16px;border-bottom:1px solid var(--line)}
.logo{font:400 34px/1 "Playfair Display",serif}.logo em{font-style:italic;color:var(--ac)}.sub{font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);margin-top:6px}
.r{display:flex;align-items:center;gap:8px}.pill{border:1px solid var(--line);padding:6px 10px;border-radius:999px;background:#fff8;color:var(--muted);font-size:11px}.pill span{color:var(--ac);font-weight:700}
.up{position:relative}.up input{position:absolute;inset:0;opacity:0}.up button{border:0;border-radius:10px;padding:9px 12px;color:#fff;background:linear-gradient(180deg,var(--ac2),var(--ac));font-weight:700;font-size:11px;letter-spacing:.08em;text-transform:uppercase}
.label{font-size:10px;color:var(--muted);letter-spacing:.16em;text-transform:uppercase;display:flex;align-items:center;gap:8px;margin-bottom:10px}.label:after{content:"";height:1px;background:var(--line);flex:1}
.list{display:flex;flex-direction:column;gap:6px}.trk{display:grid;grid-template-columns:28px 1fr auto auto;gap:8px;align-items:center;padding:11px;border:1px solid transparent;border-radius:12px;cursor:pointer;transition:.2s}
.trk:hover{background:#fff8;border-color:var(--line)}.trk.playing{background:#fffaf3;border-color:#e9b979;box-shadow:0 8px 20px rgba(217,119,6,.1)}
.num{font-size:12px;color:#b79f80;text-align:center}.name{font:400 16px/1.2 "Playfair Display",serif;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.trk.playing .name{color:var(--ac);font-style:italic}
.meta{font-size:11px;color:#ab9173}.dur{font-size:12px;color:#ab9173;min-width:30px;text-align:right}.del{border:0;background:transparent;color:#b89e84;width:22px;height:22px;border-radius:6px;opacity:1}
.empty{text-align:center;color:#b59f84;padding:60px 0}.empty b{font:52px "Playfair Display",serif;display:block}
.bar{position:fixed;left:0;right:0;bottom:0;height:var(--barh);transform:translateY(100%);transition:transform .35s cubic-bezier(.16,1,.3,1);background:color-mix(in srgb,var(--bg) 85%,#fff 15%);border-top:1px solid var(--line);backdrop-filter:blur(16px);z-index:100}
.bar.active{transform:translateY(0)}
.in{height:100%;max-width:980px;margin:0 auto;padding:10px 10px;display:grid;grid-template-columns:1fr;gap:8px}
.desk{display:none}
.mprog{display:flex;align-items:center;gap:8px}
.mbot{display:grid;grid-template-columns:1fr auto;gap:8px;align-items:center}
.mname{font:italic 16px "Playfair Display",serif;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mctrl{display:flex;gap:6px}.btn{width:32px;height:32px;border-radius:50%;border:1px solid var(--line);background:#fff;color:#7a654b;display:grid;place-items:center}.btn.main{width:44px;height:44px;border:0;background:linear-gradient(180deg,var(--ac2),var(--ac));color:#fff}
.btn svg{width:13px;height:13px}.btn.main svg{width:16px;height:16px}
.mvol{display:flex;align-items:center;gap:6px}.mvol .sw{width:90px;flex:none}
.t{font-size:11px;color:#9a8469;min-width:30px;text-align:center}
.sw{position:relative;flex:1;height:18px;touch-action:none}.st{position:absolute;left:0;right:0;top:50%;transform:translateY(-50%);height:4px;border-radius:999px;background:#e0d0b7}.sf{height:100%;width:0;background:linear-gradient(90deg,var(--ac2),var(--ac));border-radius:999px}
.sh{position:absolute;left:0;top:50%;transform:translate(-50%,-50%);width:12px;height:12px;border-radius:50%;background:#fff;border:3px solid var(--ac)}
.vb{border:0;background:transparent;color:#8b7458;width:22px;height:22px}
.sheet{position:fixed;inset:0;background:linear-gradient(180deg,var(--bg),var(--bg2));z-index:200;display:flex;flex-direction:column;padding:env(safe-area-inset-top) 16px calc(16px + env(safe-area-inset-bottom));transform:translateY(100%);transition:transform .5s cubic-bezier(.2,1,.2,1)}
.sheet.active{transform:translateY(0)}.sheet.spring{transition:transform .6s cubic-bezier(.16,1.18,.22,1)}
.stop{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}.sttl{font-size:10px;letter-spacing:.14em;color:var(--muted);text-transform:uppercase}
.close{width:34px;height:34px;border-radius:50%;border:1px solid var(--line);background:#fff7;color:var(--txt)}
.art{width:min(84vw,420px);aspect-ratio:1;margin:12px auto 16px;border-radius:12px;overflow:hidden;box-shadow:0 14px 34px rgba(0,0,0,.16)}.artbox{width:100%;height:100%;display:flex;align-items:flex-end;padding:14px;color:#fff;font:600 24px/1.1 "DM Sans",sans-serif;background:linear-gradient(135deg,#b69a72,#7f5e31)}
.sname{text-align:center;color:var(--txt);font:700 34px/1 "DM Sans",sans-serif}.ssub{text-align:center;color:var(--muted);font-size:12px;letter-spacing:.1em;margin-top:6px;margin-bottom:12px}
.sprog{display:flex;align-items:center;gap:10px;margin-bottom:14px}.sctrl{display:flex;justify-content:center;gap:14px;margin-bottom:14px}.sctrl .btn{width:56px;height:56px;background:#fff8;border-color:var(--line);color:#7a654b}.sctrl .btn.main{width:74px;height:74px;background:linear-gradient(180deg,var(--ac2),var(--ac));color:#fff}
.svol{display:flex;align-items:center;gap:10px}
.toast{position:fixed;left:50%;bottom:calc(var(--barh) + 12px);transform:translate(-50%,8px);opacity:0;transition:.22s;background:#fff;border:1px solid var(--line);padding:8px 14px;border-radius:999px;font-size:12px;color:#7d664b;z-index:220}.toast.show{opacity:1;transform:translate(-50%,0)}
@media (min-width:900px){
  :root{--barh:118px}
  .logo{font-size:42px}.wrap{padding:30px 16px calc(var(--barh)+20px)}
  .name{font-size:18px}.del{opacity:0}
  .in{grid-template-columns:1.2fr auto 1.2fr}.desk{display:block}.mprog,.mbot,.sheet{display:none}
  .nowl{font-size:10px;letter-spacing:.14em;color:#aa9072;text-transform:uppercase;margin-bottom:4px}.now{font:italic 19px "Playfair Display",serif;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .ctrl{display:flex;gap:8px}.ctrl .btn{width:40px;height:40px}.ctrl .btn.main{width:52px;height:52px}
  .right{display:flex;flex-direction:column;gap:8px}
}
</style>
</head>
<body>

    <div class="mbot"><div id="mnow" class="mname">—</div><div class="mctrl"><button id="mprev" class="btn"><svg viewBox="0 0 16 16" fill="currentColor"><path d="M3 3h1.5v10H3zm9.5 1.5L7 8l5.5 3.5V4.5z"/></svg></button><button id="mpp" class="btn main"><svg id="mpi" viewBox="0 0 16 16" fill="currentColor"><path d="M5 3.5l8 4.5-8 4.5V3.5z"/></svg><svg id="mpai" viewBox="0 0 16 16" fill="currentColor" style="display:none"><path d="M5 3h2v10H5zm4 0h2v10H9z"/></svg></button><button id="mnext" class="btn"><svg viewBox="0 0 16 16" fill="currentColor"><path d="M11.5 3H13v10h-1.5zm-9 1.5L7 8 2.5 11.5V4.5z"/></svg></button></div><div class="mvol"><button id="mvb" class="vb"><svg id="mvi" viewBox="0 0 20 20" fill="currentColor"><path d="M9.5 4L5.5 7.5H2v5h3.5L9.5 16V4z"/><path d="M12.5 7.5a3.5 3.5 0 010 5M14.8 5.2a6.5 6.5 0 010 9.6" stroke="currentColor" stroke-width="1.2" fill="none" stroke-linecap="round"/></svg></button><div id="mvw" class="sw"><div class="st"><div id="mvf" class="sf"></div></div><div id="mvt" class="sh"></div></div></div></div>
  </div>
</div>

<div id="sheet" class="sheet"><div class="stop"><div class="sttl">Now Playing</div><button id="sclose" class="close">✕</button></div><div class="art"><div id="artbox" class="artbox"></div></div><div id="snow" class="sname">—</div><div class="ssub">SESLER PREMIUM</div><div class="sprog"><span id="sct" class="t">0:00</span><div id="spw" class="sw"><div class="st"><div id="spf" class="sf"></div></div><div id="spt" class="sh"></div></div><span id="sdt" class="t">0:00</span></div><div class="sctrl"><button id="sprev" class="btn"><svg viewBox="0 0 16 16" fill="currentColor"><path d="M3 3h1.5v10H3zm9.5 1.5L7 8l5.5 3.5V4.5z"/></svg></button><button id="spp" class="btn main"><svg id="spi" viewBox="0 0 16 16" fill="currentColor"><path d="M5 3.5l8 4.5-8 4.5V3.5z"/></svg><svg id="spai" viewBox="0 0 16 16" fill="currentColor" style="display:none"><path d="M5 3h2v10H5zm4 0h2v10H9z"/></svg></button><button id="snext" class="btn"><svg viewBox="0 0 16 16" fill="currentColor"><path d="M11.5 3H13v10h-1.5zm-9 1.5L7 8 2.5 11.5V4.5z"/></svg></button></div><div class="svol"><button id="svb" class="vb"><svg id="svi" viewBox="0 0 20 20" fill="currentColor"><path d="M9.5 4L5.5 7.5H2v5h3.5L9.5 16V4z"/><path d="M12.5 7.5a3.5 3.5 0 010 5M14.8 5.2a6.5 6.5 0 010 9.6" stroke="currentColor" stroke-width="1.2" fill="none" stroke-linecap="round"/></svg></button><div id="svw" class="sw"><div class="st"><div id="svf" class="sf"></div></div><div id="svt" class="sh"></div></div></div></div>
<div id="toast" class="toast"></div>

<script>
const SUPABASE_URL='https://zjsyoqkxhabkevgyaega.supabase.co',SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inpqc3lvcWt4aGFia2V2Z3lhZWdhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg2ODA2MTAsImV4cCI6MjA5NDI1NjYxMH0.mrtRgw2y02CnAnBJNte2urvZy7Od_13-oQZ2_gPDwOo',BUCKET='muzik';
let tracks=[],idx=-1,playing=false,seeking=false,muted=false,lastVol=.8;const $=id=>document.getElementById(id),audio=$('audio');
const fmt=s=>!s||isNaN(s)?'0:00':Math.floor(s/60)+':'+String(Math.floor(s%60)).padStart(2,'0'),size=b=>!b?'':b<1048576?(b/1024).toFixed(0)+' KB':(b/1048576).toFixed(1)+' MB',url=p=>`${SUPABASE_URL}/storage/v1/object/public/${BUCKET}/${encodeURIComponent(p)}`;
const hi=`<path d="M9.5 4L5.5 7.5H2v5h3.5L9.5 16V4z"/><path d="M12.5 7.5a3.5 3.5 0 010 5M14.8 5.2a6.5 6.5 0 010 9.6" stroke="currentColor" stroke-width="1.2" fill="none" stroke-linecap="round"/>`,lo=`<path d="M9.5 4L5.5 7.5H2v5h3.5L9.5 16V4z"/><path d="M12.5 7.5a3.5 3.5 0 010 5" stroke="currentColor" stroke-width="1.2" fill="none" stroke-linecap="round"/>`,mu=`<path d="M9.5 4L5.5 7.5H2v5h3.5L9.5 16V4z" opacity=".35"/><path d="M13 8.5l3 3m0-3l-3 3" stroke="currentColor" stroke-width="1.3" fill="none" stroke-linecap="round"/>`;
const toast=t=>{$('toast').textContent=t;$('toast').classList.add('show');setTimeout(()=>$('toast').classList.remove('show'),2200)};
const setS=(f,t,p)=>{const q=Math.max(0,Math.min(1,p));const v=(q*100).toFixed(2)+'%';f.style.width=v;t.style.left=v},pof=(w,e)=>{const r=w.getBoundingClientRect(),x=e.touches?e.touches[0].clientX:e.clientX;return Math.max(0,Math.min(1,(x-r.left)/r.width))};
function bind(w,onDrag,onEnd){let a=false;const s=e=>{a=true;onDrag(pof(w,e));e.preventDefault()},m=e=>{if(a){onDrag(pof(w,e));e.preventDefault()}},u=e=>{if(!a)return;a=false;const p=e.changedTouches?e.changedTouches[0]:e;onEnd&&onEnd(pof(w,p))};w.addEventListener('mousedown',s,{passive:false});w.addEventListener('touchstart',s,{passive:false});document.addEventListener('mousemove',m,{passive:false});document.addEventListener('touchmove',m,{passive:false});document.addEventListener('mouseup',u);document.addEventListener('touchend',u)}
function icon(v){return muted||v===0?mu:v<.4?lo:hi}function setIcons(v){['vi','mvi','svi'].forEach(id=>$(id).innerHTML=icon(v))}
function vol(v){audio.volume=v;setS($('vf'),$('vt'),v);setS($('mvf'),$('mvt'),v);setS($('svf'),$('svt'),v);setIcons(v)}
function pstate(v){playing=v;[['pi','pai'],['mpi','mpai'],['spi','spai']].forEach(([a,b])=>{$(a).style.display=v?'none':'';$(b).style.display=v?'':'none'})}
function now(n){$('now').textContent=n;$('mnow').textContent=n;$('snow').textContent=n}
function art(n){const g=['linear-gradient(145deg,#b69a72,#7f5e31)','linear-gradient(145deg,#c1a37a,#8a6433)','linear-gradient(145deg,#b89f7a,#7a5d39)'];$('artbox').style.background=g[(n||'').length%g.length];$('artbox').textContent=n||'sesler'}
async function fetchTracks(){try{const r=await fetch(`${SUPABASE_URL}/storage/v1/object/list/${BUCKET}`,{method:'POST',headers:{Authorization:`Bearer ${SUPABASE_KEY}`,apikey:SUPABASE_KEY,'Content-Type':'application/json'},body:JSON.stringify({limit:500,offset:0,prefix:''})});const d=await r.json();tracks=(Array.isArray(d)?d:[]).filter(f=>f.name&&/\.(mp3|wav|flac|ogg|m4a|aac)$/i.test(f.name)).map(f=>({name:f.name.replace(/\.[^.]+$/,''),path:f.name,size:f.metadata?.size||0,url:url(f.name)}))}catch{}render()}
function render(){$('count').textContent=tracks.length;$('lbl').style.display=tracks.length?'':'none';if(!tracks.length){$('list').innerHTML='<div class="empty"><b>♩</b>Henüz parça yok — yükle</div>';return}$('list').innerHTML=tracks.map((t,i)=>`<div class="trk${i===idx?' playing':''}" onclick="pick(${i})"><div class="num">${String(i+1).padStart(2,'0')}</div><div><div class="name">${t.name}</div>${t.size?`<div class="meta">${size(t.size)}</div>`:''}</div><div class="dur" id="d-${i}">—</div><button class="del" onclick="event.stopPropagation();rem(${i})">✕</button></div>`).join('')}
function pick(i){if(idx===i&&playing){audio.pause();pstate(false);render()}else play(i)} window.pick=pick;
function play(i){if(!tracks[i])return;idx=i;audio.src=tracks[i].url;audio.currentTime=0;audio.play().catch(()=>{});now(tracks[i].name);art(tracks[i].name);$('bar').classList.add('active');pstate(true);render()}
async function rem(i){if(!confirm(`"${tracks[i].name}" silinsin mi?`))return;const p=tracks[i].path;if(idx===i){audio.pause();audio.src='';pstate(false);idx=-1;$('bar').classList.remove('active');closeSheet(false)}else if(idx>i)idx--;await fetch(`${SUPABASE_URL}/storage/v1/object/${BUCKET}/${encodeURIComponent(p)}`,{method:'DELETE',headers:{Authorization:`Bearer ${SUPABASE_KEY}`,apikey:SUPABASE_KEY}});toast('Silindi');fetchTracks()} window.rem=rem;
async function up(f){const r=await fetch(`${SUPABASE_URL}/storage/v1/object/${BUCKET}/${encodeURIComponent(f.name)}`,{method:'POST',headers:{Authorization:`Bearer ${SUPABASE_KEY}`,apikey:SUPABASE_KEY,'Content-Type':f.type||'audio/mpeg','x-upsert':'true'},body:f});return r.ok}
async function add(fs){const a=[...fs].filter(f=>f.type.startsWith('audio/')||/\.(mp3|wav|flac|ogg|m4a|aac)$/i.test(f.name));if(!a.length)return;let ok=0;for(const f of a)if(await up(f))ok++;toast(`${ok}/${a.length} parça yüklendi`);fetchTracks()}
function tog(){if(idx<0)return;if(playing){audio.pause();pstate(false)}else{audio.play().catch(()=>{});pstate(true)}render()} function nx(){if(tracks.length)play((idx+1)%tracks.length)} function pr(){if(!tracks.length)return;if(audio.currentTime>3){audio.currentTime=0;return}play((idx-1+tracks.length)%tracks.length)}
['pp','mpp','spp'].forEach(i=>$(i).onclick=tog);['next','mnext','snext'].forEach(i=>$(i).onclick=nx);['prev','mprev','sprev'].forEach(i=>$(i).onclick=pr);
['vb','mvb','svb'].forEach(i=>$(i).onclick=()=>{muted=!muted;if(muted){lastVol=audio.volume||.8;vol(0)}else vol(lastVol||.8)});
bind($('pw'),p=>{seeking=true;setS($('pf'),$('pt'),p);if(audio.duration){audio.currentTime=p*audio.duration;$('ct').textContent=fmt(audio.currentTime)}},()=>{seeking=false});
bind($('mpw'),p=>{seeking=true;setS($('mpf'),$('mpt'),p);setS($('pf'),$('pt'),p);setS($('spf'),$('spt'),p);if(audio.duration){audio.currentTime=p*audio.duration;const t=fmt(audio.currentTime);$('ct').textContent=t;$('mct').textContent=t;$('sct').textContent=t}},()=>{seeking=false});
bind($('spw'),p=>{seeking=true;setS($('spf'),$('spt'),p);setS($('mpf'),$('mpt'),p);setS($('pf'),$('pt'),p);if(audio.duration){audio.currentTime=p*audio.duration;const t=fmt(audio.currentTime);$('ct').textContent=t;$('mct').textContent=t;$('sct').textContent=t}},()=>{seeking=false});
bind($('vw'),p=>{muted=false;lastVol=p;vol(p)}); bind($('mvw'),p=>{muted=false;lastVol=p;vol(p)}); bind($('svw'),p=>{muted=false;lastVol=p;vol(p)});
audio.addEventListener('timeupdate',()=>{if(!audio.duration||seeking)return;const p=audio.currentTime/audio.duration;setS($('pf'),$('pt'),p);setS($('mpf'),$('mpt'),p);setS($('spf'),$('spt'),p);$('ct').textContent=fmt(audio.currentTime);$('dt').textContent=fmt(audio.duration);$('mct').textContent=fmt(audio.currentTime);$('mdt').textContent=fmt(audio.duration);$('sct').textContent=fmt(audio.currentTime);$('sdt').textContent=fmt(audio.duration);const d=$('d-'+idx);if(d&&d.textContent==='—')d.textContent=fmt(audio.duration)});

function openSheet(s=true){if(window.innerWidth>899||idx<0)return;$('sheet').classList.toggle('spring',!!s);$('sheet').classList.add('active')} function closeSheet(s=true){$('sheet').classList.toggle('spring',!!s);$('sheet').classList.remove('active')}
$('sclose').onclick=()=>closeSheet(true);
$('bar').addEventListener('click',e=>{if(window.innerWidth<=899&&!e.target.closest('button')&&!e.target.closest('.sw'))openSheet(true)});
let sy=null,dy=0;$('sheet').addEventListener('touchstart',e=>{if(!$('sheet').classList.contains('active'))return;sy=e.touches[0].clientY;dy=0},{passive:true});$('sheet').addEventListener('touchmove',e=>{if(sy===null)return;const d=e.touches[0].clientY-sy;if(d>0){dy=d;$('sheet').style.transform=`translateY(${Math.min(70,d/6)}%)`}},{passive:true});$('sheet').addEventListener('touchend',()=>{$('sheet').style.transform='';if(sy===null)return;if(dy>90)closeSheet(true);sy=null;dy=0});
$('file').addEventListener('change',e=>add(e.target.files));document.addEventListener('drop',e=>{e.preventDefault();add(e.dataTransfer.files)});document.addEventListener('dragover',e=>e.preventDefault());
vol(.8);fetchTracks();
</script>
