<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">

  <!-- iOS tam ekran + status bar rengi -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="mobile-web-app-capable" content="yes">

  <!-- Android + tarayıcı üst çubuk rengi -->
  <meta name="theme-color" content="#0a0800">

  <title>sesler</title>

  <!-- Fontlar -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Arka plan dokusu -->
  <div class="bg-grain" aria-hidden="true"></div>
  <div class="bg-glow" aria-hidden="true"></div>

  <!-- ══════════════════════════════════
       ANA İÇERİK
  ══════════════════════════════════ -->
  <main class="wrap" id="main">

    <!-- HEADER -->
    <header class="hdr">
      <div class="hdr-brand">
        <h1 class="logo">ses<em>ler</em></h1>
        <span class="logo-sub">müzik arşivi</span>
      </div>
      <div class="hdr-actions">
        <div class="pill" id="countPill"><span id="count">0</span> parça</div>
        <label class="upload-btn" id="uploadBtn">
          <input type="file" id="fileInput" accept="audio/*" multiple>
          <svg class="upload-icon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M10 14V4M5 8l5-5 5 5M3 17h14"/>
          </svg>
          <span>Yükle</span>
        </label>
      </div>
    </header>

    <!-- YÜKLEME ÇUBUĞU -->
    <div class="upload-progress" id="uploadProgress">
      <div class="up-info">
        <span class="up-label">yükleniyor</span>
        <span class="up-filename" id="upFilename">—</span>
      </div>
      <div class="up-track">
        <div class="up-fill" id="upFill"></div>
      </div>
      <span class="up-pct" id="upPct">0%</span>
    </div>

    <!-- PARÇALAR BAŞLIĞI -->
    <div class="section-hdr" id="sectionHdr">
      <span class="section-title">Parçalar</span>
      <div class="section-line"></div>
    </div>

    <!-- PARÇA LİSTESİ -->
    <div class="track-list" id="trackList">
      <!-- JS ile doldurulur -->
      <div class="empty-state" id="emptyState">
        <div class="empty-note">♩</div>
        <p>Henüz parça yok</p>
        <span>Yükle butonuna bas ya da dosyaları sürükle</span>
      </div>
    </div>

  </main>

  <!-- ══════════════════════════════════
       OYNATICI ÇUBUĞU (her zaman altta)
  ══════════════════════════════════ -->
  <div class="player-bar" id="playerBar">
    <audio id="audioEl" preload="none"></audio>

    <div class="player-inner">

      <!-- MOBİL: İLERLEME ÇUBUĞU (üstte) -->
      <div class="seek-row mobile-only">
        <span class="time-label" id="mCurTime">0:00</span>
        <div class="seek-wrap" id="mSeekWrap">
          <div class="seek-track">
            <div class="seek-fill" id="mSeekFill"></div>
          </div>
          <div class="seek-thumb" id="mSeekThumb"></div>
        </div>
        <span class="time-label" id="mDurTime">0:00</span>
      </div>

      <!-- MOBİL: ALT SATIR -->
      <div class="player-row mobile-only">
        <div class="now-playing-mobile" id="nowPlayingMobile">—</div>
        <div class="controls-mobile">
          <button class="ctrl-btn" id="mPrevBtn" aria-label="Önceki">
            <svg viewBox="0 0 20 20" fill="currentColor"><path d="M4 4h2v12H4zm10 1.5L8 10l6 4.5V5.5z"/></svg>
          </button>
          <button class="ctrl-btn ctrl-main" id="mPlayBtn" aria-label="Oynat/Durdur">
            <svg class="icon-play" viewBox="0 0 20 20" fill="currentColor"><path d="M6 4l12 6-12 6V4z"/></svg>
            <svg class="icon-pause" viewBox="0 0 20 20" fill="currentColor" style="display:none"><path d="M6 4h3v12H6zm5 0h3v12h-3z"/></svg>
          </button>
          <button class="ctrl-btn" id="mNextBtn" aria-label="Sonraki">
            <svg viewBox="0 0 20 20" fill="currentColor"><path d="M14 4h2v12h-2zM4 5.5L10 10 4 14.5V5.5z"/></svg>
          </button>
        </div>
      </div>

      <!-- DESKTOP: SOL (şarkı adı) -->
      <div class="player-left desktop-only">
        <div class="now-art" id="deskArt">♩</div>
        <div class="now-info">
          <div class="now-label">Şu an çalıyor</div>
          <div class="now-name" id="deskNowName">—</div>
        </div>
      </div>

      <!-- DESKTOP: ORTA (kontroller + seek) -->
      <div class="player-center desktop-only">
        <div class="controls-desk">
          <button class="ctrl-btn" id="dPrevBtn" aria-label="Önceki">
            <svg viewBox="0 0 20 20" fill="currentColor"><path d="M4 4h2v12H4zm10 1.5L8 10l6 4.5V5.5z"/></svg>
          </button>
          <button class="ctrl-btn ctrl-main" id="dPlayBtn" aria-label="Oynat/Durdur">
            <svg class="icon-play" viewBox="0 0 20 20" fill="currentColor"><path d="M6 4l12 6-12 6V4z"/></svg>
            <svg class="icon-pause" viewBox="0 0 20 20" fill="currentColor" style="display:none"><path d="M6 4h3v12H6zm5 0h3v12h-3z"/></svg>
          </button>
          <button class="ctrl-btn" id="dNextBtn" aria-label="Sonraki">
            <svg viewBox="0 0 20 20" fill="currentColor"><path d="M14 4h2v12h-2zM4 5.5L10 10 4 14.5V5.5z"/></svg>
          </button>
        </div>
        <div class="seek-row">
          <span class="time-label" id="dCurTime">0:00</span>
          <div class="seek-wrap" id="dSeekWrap">
            <div class="seek-track">
              <div class="seek-fill" id="dSeekFill"></div>
            </div>
            <div class="seek-thumb" id="dSeekThumb"></div>
          </div>
          <span class="time-label" id="dDurTime">0:00</span>
        </div>
      </div>

      <!-- DESKTOP: SAĞ (volume) -->
      <div class="player-right desktop-only">
        <button class="vol-btn" id="dVolBtn" aria-label="Ses">
          <svg class="icon-vol-hi" viewBox="0 0 20 20" fill="currentColor">
            <path d="M11 3.5v13l-5-4H2V7.5h4l5-4zm2.5 2.8a5 5 0 010 7.4M16 4a8 8 0 010 12"/>
          </svg>
          <svg class="icon-vol-lo" viewBox="0 0 20 20" fill="currentColor" style="display:none">
            <path d="M11 3.5v13l-5-4H2V7.5h4l5-4zm2.5 2.8a5 5 0 010 7.4"/>
          </svg>
          <svg class="icon-vol-mute" viewBox="0 0 20 20" fill="currentColor" style="display:none">
            <path d="M11 3.5v13l-5-4H2V7.5h4l5-4zM14 8l4 4m0-4l-4 4"/>
          </svg>
        </button>
        <div class="seek-wrap vol-wrap" id="dVolWrap">
          <div class="seek-track">
            <div class="seek-fill" id="dVolFill"></div>
          </div>
          <div class="seek-thumb" id="dVolThumb"></div>
        </div>
      </div>

    </div>
  </div>

  <!-- ══════════════════════════════════
       MOBİL TAM EKRAN OYNATICI (sheet)
  ══════════════════════════════════ -->
  <div class="sheet" id="sheet">
    <div class="sheet-handle" id="sheetHandle"></div>

    <div class="sheet-header">
      <span class="sheet-label">Şu an çalıyor</span>
      <button class="sheet-close" id="sheetClose" aria-label="Kapat">
        <svg viewBox="0 0 20 20" fill="currentColor"><path d="M5 5l10 10M15 5L5 15" stroke="currentColor" stroke-width="2" stroke-linecap="round" fill="none"/></svg>
      </button>
    </div>

    <!-- Kapak -->
    <div class="sheet-art-wrap">
      <div class="sheet-art" id="sheetArt">
        <span class="sheet-art-letter" id="sheetArtLetter">♩</span>
      </div>
    </div>

    <!-- Şarkı adı -->
    <div class="sheet-track-info">
      <div class="sheet-track-name" id="sheetTrackName">—</div>
      <div class="sheet-track-sub">SESLER MÜZİK</div>
    </div>

    <!-- İlerleme -->
    <div class="seek-row sheet-seek">
      <span class="time-label" id="sCurTime">0:00</span>
      <div class="seek-wrap" id="sSeekWrap">
        <div class="seek-track">
          <div class="seek-fill" id="sSeekFill"></div>
        </div>
        <div class="seek-thumb" id="sSeekThumb"></div>
      </div>
      <span class="time-label" id="sDurTime">0:00</span>
    </div>

    <!-- Kontroller -->
    <div class="sheet-controls">
      <button class="ctrl-btn sheet-ctrl-btn" id="sPrevBtn" aria-label="Önceki">
        <svg viewBox="0 0 20 20" fill="currentColor"><path d="M4 4h2v12H4zm10 1.5L8 10l6 4.5V5.5z"/></svg>
      </button>
      <button class="ctrl-btn ctrl-main sheet-ctrl-main" id="sPlayBtn" aria-label="Oynat/Durdur">
        <svg class="icon-play" viewBox="0 0 20 20" fill="currentColor"><path d="M6 4l12 6-12 6V4z"/></svg>
        <svg class="icon-pause" viewBox="0 0 20 20" fill="currentColor" style="display:none"><path d="M6 4h3v12H6zm5 0h3v12h-3z"/></svg>
      </button>
      <button class="ctrl-btn sheet-ctrl-btn" id="sNextBtn" aria-label="Sonraki">
        <svg viewBox="0 0 20 20" fill="currentColor"><path d="M14 4h2v12h-2zM4 5.5L10 10 4 14.5V5.5z"/></svg>
      </button>
    </div>

    <!-- Volume (sheet) -->
    <div class="sheet-vol">
      <button class="vol-btn" id="sVolBtn" aria-label="Ses">
        <svg class="icon-vol-hi" viewBox="0 0 20 20" fill="currentColor">
          <path d="M11 3.5v13l-5-4H2V7.5h4l5-4zm2.5 2.8a5 5 0 010 7.4M16 4a8 8 0 010 12"/>
        </svg>
        <svg class="icon-vol-lo" viewBox="0 0 20 20" fill="currentColor" style="display:none">
          <path d="M11 3.5v13l-5-4H2V7.5h4l5-4zm2.5 2.8a5 5 0 010 7.4"/>
        </svg>
        <svg class="icon-vol-mute" viewBox="0 0 20 20" fill="currentColor" style="display:none">
          <path d="M11 3.5v13l-5-4H2V7.5h4l5-4zM14 8l4 4m0-4l-4 4"/>
        </svg>
      </button>
      <div class="seek-wrap vol-wrap" id="sVolWrap">
        <div class="seek-track">
          <div class="seek-fill" id="sVolFill"></div>
        </div>
        <div class="seek-thumb" id="sVolThumb"></div>
      </div>
    </div>

  </div>

  <!-- Toast bildirimi -->
  <div class="toast" id="toast" aria-live="polite"></div>

  <script src="app.js"></script>
</body>
</html>
